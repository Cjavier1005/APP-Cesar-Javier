<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reuniones Familiares - Cesar Javier</title>

<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="./styles.css">

<style>
table th, table td { text-align: center !important; vertical-align: middle !important; }
</style>
</head>

<body>

<header class="app-header">
  <h1>Reuniones Familiares - Cesar Javier</h1>
  <button id="resetBtn">🧹 Reiniciar</button>
</header>

<!-- ⚠️ TU CONTENIDO ORIGINAL SE MANTIENE IGUAL -->
<!-- (NO LO CAMBIO para no romper app.js) -->

<footer><small>MAGICO 10</small></footer>


<script src="./app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGiJkznNQhg83xnqy5_-k7snCBGPsVWzM",
  authDomain: "app-cesar-javier-93a62.firebaseapp.com",
  projectId: "app-cesar-javier-93a62",
  storageBucket: "app-cesar-javier-93a62.firebasestorage.app",
  messagingSenderId: "720388426649",
  appId: "1:720388426649:web:4f1e70f99992268a966108"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ ESPERAR CARGA COMPLETA (CLAVE)
window.addEventListener("load", () => {

  // PERSONAS
  document.getElementById("personaForm")?.addEventListener("submit", async () => {
    await addDoc(collection(db, "personas"), {
      nombre: personaNombre.value,
      cedula: personaCedula.value,
      cumple: personaCumple.value,
      fecha: new Date()
    });
    console.log("✅ persona enviada");
  });

  // FAMILIAS
  document.getElementById("familiaForm")?.addEventListener("submit", async () => {
    await addDoc(collection(db, "familias"), {
      nombre: familiaNombre.value,
      fecha: new Date()
    });
  });

  // REUNIONES
  document.getElementById("reunionForm")?.addEventListener("submit", async () => {
    await addDoc(collection(db, "reuniones"), {
      persona: reunionPersona.value,
      mes: reunionMes.value,
      valor: parseFloat(reunionValor.value),
      fecha: new Date()
    });
  });

  // MENSUALIDADES
  document.getElementById("mensualForm")?.addEventListener("submit", async () => {
    await addDoc(collection(db, "mensualidades"), {
      familia: mensualFamilia.value,
      mes: mensualMes.value,
      valor: parseFloat(mensualValor.value),
      fecha: new Date()
    });
  });

  // DEUDAS
  document.getElementById("deudaForm")?.addEventListener("submit", async () => {
    await addDoc(collection(db, "deudas"), {
      fecha: deudaFecha.value,
      nombre: deudaNombre.value,
      valor: parseFloat(deudaValor.value)
    });
  });

  // GASTOS
  document.getElementById("gastoForm")?.addEventListener("submit", async () => {
    await addDoc(collection(db, "gastos"), {
      fecha: gastoFecha.value,
      nombre: gastoNombre.value,
      valor: parseFloat(gastoValor.value)
    });
  });

  // EXTRAS
  document.getElementById("extraForm")?.addEventListener("submit", async () => {
    await addDoc(collection(db, "extras"), {
      detalle: extraInvitado.value,
      valor: parseFloat(extraValor.value),
      fecha: new Date()
    });
  });

});

</script>

</body>
</html>
